# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - id: monorel
    binary: monorel
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Env.VERSION}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser
    goos:
      - aix
      - darwin
      - dragonfly
      - freebsd
      - illumos
      - js
      - linux
      - netbsd
      - openbsd
      - plan9
      - solaris
      - wasip1
      - windows
  # iOS requires CGO_ENABLED=1 and the Xcode toolchain.
  #- id: monorel-ios
  #  binary: monorel
  #  env:
  #    - CGO_ENABLED=1
  #  goos:
  #    - ios
  # Android CGO_ENABLED=0 builds arm64 only; CGO builds require the NDK.
  #- id: monorel-android
  #  binary: monorel
  #  env:
  #    - CGO_ENABLED=0
  #  goos:
  #    - android
  #  goarch:
  #    - arm64

archives:
  - id: monorel
    ids: [monorel]
    formats: [tar.gz, tar.zst]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    # it uses the VERSION env var so the prefixed monorepo tag doesn't appear in archive filenames.
    name_template: >-
      monorel_{{ .Env.VERSION }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip, tar.gz]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

checksum:
  name_template: "monorel_{{ .Env.VERSION }}_checksums.txt"
  disable: false

# Release is disabled: goreleaser Pro is required to publish with a
# prefixed monorepo tag. We use 'gh release' instead (see release script).
release:
  disable: true
